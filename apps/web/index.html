<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Favicon ─────────────────────────────────────────── -->
    <link rel="icon" href="/favicon-48x48.png" sizes="48x48" />
    <link rel="icon" href="/icon.svg" sizes="any" type="image/svg+xml" />

    <!-- ── Viewport / PWA chrome ───────────────────────────── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0d0d1f" />

    <!-- ── Android PWA ─────────────────────────────────────── -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- ── iOS PWA ─────────────────────────────────────────── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BOF CRM" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />

    <!-- iOS Splash Screens (Portrait) -->
    <!-- iPhone 16 Pro Max (430×932 @3x → 1290×2796) -->
    <link rel="apple-touch-startup-image"
          media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
          href="/apple-touch-icon-180x180.png" />
    <!-- iPhone 14 Pro / 15 Pro (393×852 @3x → 1179×2556) -->
    <link rel="apple-touch-startup-image"
          media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
          href="/apple-touch-icon-180x180.png" />
    <!-- iPhone SE / older (375×667 @2x) -->
    <link rel="apple-touch-startup-image"
          media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
          href="/apple-touch-icon-180x180.png" />

    <!-- ── Fonts ────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- ── App title ────────────────────────────────────────── -->
    <title>BOF CRM</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
