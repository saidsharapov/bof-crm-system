version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bof_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bof_crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: bof_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/bof_crm
      JWT_ACCESS_SECRET: change-me-in-production-access
      JWT_REFRESH_SECRET: change-me-in-production-refresh
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - postgres

volumes:
  postgres_data:
