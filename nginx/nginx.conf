# ─── HTTP: ACME challenge + redirect to HTTPS ────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name bofcrm.uz www.bofcrm.uz;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://bofcrm.uz$request_uri;
    }
}

# ─── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name bofcrm.uz www.bofcrm.uz;

    # ── SSL certificates (Let's Encrypt via certbot) ──────────────────────────
    ssl_certificate     /etc/letsencrypt/live/bofcrm.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bofcrm.uz/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/bofcrm.uz/chain.pem;

    # Mozilla Intermediate configuration — TLS 1.2 + 1.3
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            SAMEORIGIN                                    always;
    add_header X-Content-Type-Options     nosniff                                       always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"             always;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/javascript
        application/manifest+json
        image/svg+xml;

    # ── API reverse proxy → NestJS ─────────────────────────────────────────────
    location /api {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        client_max_body_size 10m;
    }

    # ── PWA: Service Worker — must never be cached ─────────────────────────────
    location = /sw.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        expires 0;
    }

    # ── PWA: Web App Manifest — short-lived cache ─────────────────────────────
    location ~* \.(webmanifest|manifest\.json)$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # ── Static assets — immutable long cache (Vite adds content hash) ─────────
    location ~* \.(?:js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp|avif)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback — all navigation requests serve index.html ───────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
